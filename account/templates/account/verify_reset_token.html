{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiddoCore | Set New Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f5f7ff',
                            100: '#ebf0fe',
                            500: '#6366f1',
                            600: '#4f46e5',
                            dark: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top right, #e0e7ff 0%, #ffffff 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-focus-effect:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
        }

        .password-strength-container {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .password-strength-container.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 antialiased text-slate-900">

<div class="w-full max-w-[520px] opacity-0 translate-y-4 transition-all duration-500" id="mainContainer">
    <div class="flex items-center justify-center gap-3 mb-8">
        <div class="bg-brand-500 p-2 rounded-xl text-white shadow-lg shadow-brand-500/30">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l9-5-9-5-9 5 9 5z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
            </svg>
        </div>
        <span class="text-xl font-bold tracking-tight text-brand-dark">KiddoCore</span>
    </div>

    <div class="glass-card rounded-[2.5rem] shadow-2xl p-8 lg:p-10">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-extrabold text-brand-dark mb-2">Secure Your Account</h2>
            <p class="text-slate-500 text-sm font-medium">Please enter and confirm your new password below.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-2xl flex items-center gap-3 text-xs font-bold {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100{% else %}bg-green-50 text-green-600 border border-green-100{% endif %}">
                    <i class="fas {% if message.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" id="resetForm" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-extrabold text-slate-500 uppercase tracking-widest ml-1">New Password</label>
                <div class="relative group">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="{{ form.new_password.name }}" id="{{ form.new_password.id_for_label }}"
                           class="w-full pl-14 pr-14 py-4 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 font-medium placeholder:text-slate-400 focus:bg-white outline-none transition-all input-focus-effect"
                           placeholder="••••••••" oninput="checkStrength(this.value)" required autofocus>
                    <button type="button" onclick="togglePass('{{ form.new_password.id_for_label }}', this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-500 transition-colors">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div id="strengthContainer" class="password-strength-container pt-1">
                    <div class="flex gap-1 h-1.5 mb-2">
                        <div id="bar1" class="flex-1 rounded-full bg-slate-200 transition-all duration-500"></div>
                        <div id="bar2" class="flex-1 rounded-full bg-slate-200 transition-all duration-500"></div>
                        <div id="bar3" class="flex-1 rounded-full bg-slate-200 transition-all duration-500"></div>
                    </div>
                    <span id="strengthText" class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Strength: Weak</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-extrabold text-slate-500 uppercase tracking-widest ml-1">Confirm Password</label>
                <div class="relative group">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="fas fa-shield-check"></i>
                    </span>
                    <input type="password" name="{{ form.confirm_password.name }}" id="{{ form.confirm_password.id_for_label }}"
                           class="w-full pl-14 pr-14 py-4 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 font-medium placeholder:text-slate-400 focus:bg-white outline-none transition-all input-focus-effect"
                           placeholder="••••••••" oninput="checkMatch()" required>
                    <button type="button" onclick="togglePass('{{ form.confirm_password.id_for_label }}', this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-500 transition-colors">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <p id="matchError" class="hidden text-[11px] text-red-500 font-bold ml-1">Passwords do not match</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-brand-dark text-white py-4 rounded-2xl font-bold text-lg shadow-xl hover:bg-slate-800 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-3">
                <span>Update Password</span>
                <i class="fas fa-check-circle text-sm"></i>
            </button>
        </form>
    </div>
</div>

<script>
    window.onload = () => {
        const container = document.getElementById('mainContainer');
        container.classList.remove('opacity-0', 'translate-y-4');
    };

    function togglePass(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function checkStrength(p) {
        const container = document.getElementById('strengthContainer');
        const text = document.getElementById('strengthText');
        const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];

        if (!p) { container.classList.remove('show'); return; }
        container.classList.add('show');

        let s = 0;
        if (p.length >= 8) s++;
        if (/[A-Z]/.test(p) && /[0-9]/.test(p)) s++;
        if (/[^A-Za-z0-9]/.test(p)) s++;

        bars.forEach(b => b.className = 'flex-1 rounded-full bg-slate-200');

        if (s === 1) {
            bars[0].classList.add('bg-red-400');
            text.innerText = "Strength: Weak";
            text.className = "text-[10px] font-bold uppercase tracking-wider text-red-400";
        } else if (s === 2) {
            bars[0].classList.add('bg-amber-400');
            bars[1].classList.add('bg-amber-400');
            text.innerText = "Strength: Medium";
            text.className = "text-[10px] font-bold uppercase tracking-wider text-amber-400";
        } else if (s === 3) {
            bars.forEach(b => b.classList.add('bg-emerald-400'));
            text.innerText = "Strength: Strong";
            text.className = "text-[10px] font-bold uppercase tracking-wider text-emerald-400";
        }
    }

    function checkMatch() {
        const p = document.getElementById('{{ form.new_password.id_for_label }}').value;
        const c = document.getElementById('{{ form.confirm_password.id_for_label }}').value;
        const err = document.getElementById('matchError');
        const btn = document.getElementById('submitBtn');

        if (c && p !== c) {
            err.classList.remove('hidden');
            btn.disabled = true;
            btn.style.opacity = "0.5";
        } else {
            err.classList.add('hidden');
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }
</script>

</body>
</html>
