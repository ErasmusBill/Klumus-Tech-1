services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-klumus}
      POSTGRES_USER: ${POSTGRES_USER:-klumus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-klumus}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klumus} -d ${POSTGRES_DB:-klumus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-klumus}:${POSTGRES_PASSWORD:-klumus}@db:5432/${POSTGRES_DB:-klumus}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev

  web-prod:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-klumus}:${POSTGRES_PASSWORD:-klumus}@db:5432/${POSTGRES_DB:-klumus}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    profiles:
      - prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-klumus}:${POSTGRES_PASSWORD:-klumus}@db:5432/${POSTGRES_DB:-klumus}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev

  worker-prod:
    build: .
    command: celery -A config worker -l info
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-klumus}:${POSTGRES_PASSWORD:-klumus}@db:5432/${POSTGRES_DB:-klumus}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - prod

volumes:
  db_data:
