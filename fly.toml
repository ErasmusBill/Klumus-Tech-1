app = "klumus-tech-1"
primary_region = "ams"
console_command = "python manage.py shell"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"

[env]
  PORT = "8080"
  # You MUST set this in your Fly Secrets or here if you have a URL
  # Example: REDIS_URL = "redis://default:password@your-redis-url.upstash.io:6379"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

[processes]
  # FORCED TO 8080 TO MATCH FLY.IO
  app = "gunicorn --bind :8080 --workers 2 config.wsgi"
  celery = "celery -A config worker --loglevel=INFO"

[[statics]]
  guest_path = "/code/static"
  url_prefix = "/static/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512